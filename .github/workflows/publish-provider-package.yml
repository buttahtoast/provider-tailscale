name: Publish Provider Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  publish-provider-package:
    uses: crossplane-contrib/provider-workflows/.github/workflows/publish-provider.yml@451c4dc6ad3691b0a702a997a0ac24e8bbc8bbaa # main
    with:
      repository: provider-tailscale
      registry_org: ${{ github.repository_owner }}
      version: ${{ github.ref_name }}
      go-version: '1.24'
      cleanup-disk: true
      mirror: false
    secrets:
      GHCR_PAT: ${{ secrets.GITHUB_TOKEN }}

  mirror-to-upbound:
    runs-on: ubuntu-24.04
    needs: publish-provider-package
    steps:
      - name: Check mirror credentials
        id: mirror
        env:
          XPKG_MIRROR_ACCESS_ID: ${{ secrets.XPKG_MIRROR_ACCESS_ID }}
          XPKG_MIRROR_TOKEN: ${{ secrets.XPKG_MIRROR_TOKEN }}
        run: |
          if [[ -n "${XPKG_MIRROR_ACCESS_ID}" && -n "${XPKG_MIRROR_TOKEN}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup crane
        if: steps.mirror.outputs.enabled == 'true'
        uses: imjasonh/setup-crane@00f6a8e0edf2fa84a8ed2224c884cae6b3fb38ad # v0.4

      - name: Login to GHCR
        if: steps.mirror.outputs.enabled == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Upbound
        if: steps.mirror.outputs.enabled == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.1.0
        with:
          registry: xpkg.upbound.io
          username: ${{ secrets.XPKG_MIRROR_ACCESS_ID }}
          password: ${{ secrets.XPKG_MIRROR_TOKEN }}

      - name: Mirror to Upbound
        if: steps.mirror.outputs.enabled == 'true'
        run: |
          crane copy \
            "ghcr.io/${{ github.repository_owner }}/provider-tailscale:${{ github.ref_name }}" \
            "xpkg.upbound.io/buttah-cloud/provider-tailscale:${{ github.ref_name }}" \
            --allow-nondistributable-artifacts

  publish-github-release:
    runs-on: ubuntu-24.04
    needs:
      - publish-provider-package
      - mirror-to-upbound
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2.2.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          make_latest: ${{ !(contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc')) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}